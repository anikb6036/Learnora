name: SoundWave CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Linter (Type Check)
        run: npm run lint
        
      - name: Build Project
        run: npm run build
        env:
          NODE_ENV: production

  deploy-vercel:
    name: Deploy to Vercel
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::Vercel deployment secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are not configured. Skipping Vercel deployment."
            echo "========================================================================================="
            echo "FRONTEND & BACKEND DEPLOYMENT CONFIGURATION:"
            echo "To enable automatic deployment to Vercel, please configure these secrets on GitHub:"
            echo "1. Go to repository Settings -> Secrets and variables -> Actions"
            echo "2. Add the following repository secrets:"
            echo "   - VERCEL_TOKEN"
            echo "   - VERCEL_ORG_ID"
            echo "   - VERCEL_PROJECT_ID"
            echo "========================================================================================="
          else
            vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
